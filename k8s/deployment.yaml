apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ecommerce-app 
  template:
    metadata:
      labels:
        app: ecommerce-app 

    spec:
      containers:
        - name: ecommerce-app
          image: viishnu24/multibranch-flask-app:build-6
          ports:
            - containerPort: 5000